<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-admin">
  <main class="container admin-layout">
    <section class="card">
      <h1>Admin Portal</h1>
      <p>Use your admin key to update profile content in Supabase.</p>
      <label>Admin Key</label>
      <input id="adminKey" type="password" placeholder="Paste ADMIN_PORTAL_KEY" />
      <button id="loadBtn" class="btn">Load Existing Data</button>
      <p id="status" class="status"></p>
    </section>

    <section class="card">
      <h2>Profile</h2>
      <label>Name</label>
      <input id="name" />
      <label>Headline</label>
      <input id="headline" />
      <label>About</label>
      <textarea id="about" rows="4"></textarea>
      <button id="saveProfile" class="btn">Save Profile</button>
    </section>

    <section class="card">
      <h2>Add Skill</h2>
      <input id="skillName" placeholder="Skill name" />
      <button id="addSkill" class="btn">Add Skill</button>
      <ul id="skillList" class="simple-list"></ul>
    </section>

    <section class="card wide">
      <h2>Add Project</h2>
      <input id="projectTitle" placeholder="Project title" />
      <input id="projectStack" placeholder="Tech stack" />
      <textarea id="projectSummary" rows="3" placeholder="Short project summary"></textarea>
      <input id="projectLink" placeholder="Project URL" />
      <button id="addProject" class="btn">Add Project</button>
      <ul id="projectList" class="simple-list"></ul>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
