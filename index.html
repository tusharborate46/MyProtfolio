<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Portfolio</title>
  <meta name="description" content="Modern portfolio powered by Supabase and admin portal." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-gradient">
  <header class="topbar container">
    <div>
      <p class="eyebrow">Portfolio Template v2</p>
      <h1 id="name">Loading...</h1>
      <p id="headline" class="headline">Please wait while profile details are loaded.</p>
    </div>
    <a href="admin.html" class="btn">Admin Portal</a>
  </header>

  <main class="container layout">
    <section class="card">
      <h2>About</h2>
      <p id="about">Fetching your profile summary...</p>
      <ul id="contacts" class="contact-list"></ul>
    </section>

    <section class="card">
      <h2>Skills</h2>
      <div id="skills" class="tag-grid"></div>
    </section>

    <section class="card wide">
      <h2>Featured Projects</h2>
      <div id="projects" class="project-grid"></div>
    </section>
  </main>

  <footer class="container footer-note">Data source: Supabase + Express API</footer>

  <script src="frontend.js"></script>
</body>
</html>
